application:
  title: Otaku Community
  version: 1.0.0

spring:
  application:
    name: otaku-community-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://ep-twilight-art-a1bnx2bz-pooler.ap-southeast-1.aws.neon.tech/otaku_community?sslmode=require&channelBinding=require}
    username: ${DATABASE_USERNAME:neondb_owner}
    password: ${DATABASE_PASSWORD:npg_0aLuQspkJ7ny}
