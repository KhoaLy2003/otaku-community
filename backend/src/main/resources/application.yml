application:
  title: Otaku Community
  version: 1.0.0

spring:
  application:
    name: otaku-community-backend
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: false
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: false

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

server:
  port: ${PORT:8080}
  servlet:
    context-path:

# Auth0 Configuration
auth0:
  audience: ${AUTH0_AUDIENCE}
  domain: ${AUTH0_DOMAIN}

okta:
  oauth2:
    issuer: ${OKTA_OATH2_ISSUER}
    client-id: ${OKTA_OATH2_CLIENT_ID}
    client-secret: ${OKTA_OATH2_CLIENT_SECRET}

# Cloudinary Configuration
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}
  folder: ${CLOUDINARY_FOLDER_NAME}

# CORS Configuration
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true

# Application Configuration
app:
  frontend:
    url: ${FRONTEND_URL:http://localhost:3000}
  pagination:
    default-page-size: 20
    max-page-size: 100
  upload:
    max-images-per-post: 4
    max-image-size: 5242880 # 5MB in bytes
  rate-limit:
    enabled: true
    requests-per-minute: 100

# Logging
logging:
  level:
    root: INFO
    com.otaku.community: DEBUG
    org.springframework.web: INFO
#    org.springframework.web.socket: TRACE
#    org.springframework.web.socket.server.support: TRACE
#    org.springframework.web.socket.sockjs: TRACE
#    org.springframework.messaging: TRACE
#    org.hibernate.SQL: DEBUG
#    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# Springdoc OpenAPI
springdoc:
  api-docs:
    path: /docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
